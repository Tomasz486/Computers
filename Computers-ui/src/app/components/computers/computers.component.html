<div class="page">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Lista komputerów</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="filterForm" class="filters">
        <mat-form-field appearance="outline">
          <mat-label>Nazwa</mat-label>
          <input matInput formControlName="name" placeholder="np. Acer">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Data księgowania</mat-label>
          <input matInput type="date" formControlName="accountingDate">
        </mat-form-field>

        <button mat-raised-button type="button" (click)="clearFilters()">Wyczyść</button>
      </form>

      @if (loading) {
        <div class="center">
          <mat-spinner diameter="40"></mat-spinner>
        </div>
      }

      @if (errorMessage) {
        <div class="error">{{ errorMessage }}</div>
      }

      <div class="table-wrapper">
        <table mat-table [dataSource]="data" matSort (matSortChange)="onSortChange($event)" class="full-width-table">

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="name">Nazwa</th>
            <td mat-cell *matCellDef="let row">{{ row.name }}</td>
          </ng-container>

          <ng-container matColumnDef="accountingDate">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="accountingDate">Data księgowania</th>
            <td mat-cell *matCellDef="let row">{{ row.accountingDate }}</td>
          </ng-container>

          <ng-container matColumnDef="costUsd">
            <th mat-header-cell *matHeaderCellDef>Koszt USD</th>
            <td mat-cell *matCellDef="let row">{{ row.costUsd | number:'1.2-2' }}</td>
          </ng-container>

          <ng-container matColumnDef="costPln">
            <th mat-header-cell *matHeaderCellDef>Koszt PLN</th>
            <td mat-cell *matCellDef="let row">{{ row.costPln | number:'1.2-2' }}</td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>

      <mat-paginator
        [length]="totalElements"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [pageSizeOptions]="[5, 10, 20]"
        (page)="onPageChange($event)"
        showFirstLastButtons>
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
